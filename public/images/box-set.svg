      <text x="65" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#065f46">SNAILCREAM</text>
      <text x="65" y="80" text-anchor="middle" font-family="Arial" font-size="9" fill="#77948a">10 g · Made in Germany</text>
