<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbf5"/>
      <stop offset="1" stop-color="#fef3e2"/>
    </linearGradient>
  </defs>
  <rect width="480" height="480" rx="32" fill="url(#bg)"/>
  <ellipse cx="240" cy="408" rx="150" ry="18" fill="#065f46" opacity="0.12"/>

  <!-- open lid laid beside jar -->
  <ellipse cx="118" cy="392" rx="64" ry="16" fill="#065f46" opacity="0.18"/>
  <ellipse cx="118" cy="384" rx="64" ry="18" fill="url(#lid)"/>
  <ellipse cx="118" cy="380" rx="56" ry="14" fill="#0d9488" opacity="0.5"/>

  <!-- jar body -->
  <path d="M158 210c0-14 12-22 26-22h112c14 0 26 8 26 22v160c0 22-18 38-40 38h-84c-22 0-40-16-40-38z" fill="url(#glass)" stroke="#cbd5e1" stroke-width="2"/>
  <path d="M170 220h18v170h-18z" fill="#ffffff" opacity="0.65" rx="8"/>

  <!-- cream surface -->
  <path d="M164 214c0-10 9-16 20-16h112c11 0 20 6 20 16 0 12-16 14-30 10s-24 6-40 6-22-8-38-6-34 2-44-10z" fill="url(#cream)"/>
  <path d="M204 206c8-6 20-8 30-4s22 2 30-2" stroke="#f1d9b8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- label -->
  <rect x="176" y="258" width="128" height="104" rx="12" fill="#ffffff" stroke="#d6e5dc" stroke-width="2"/>
  <g transform="translate(226 288) scale(0.5)">
    <circle cx="20" cy="0" r="22" fill="none" stroke="#059669" stroke-width="6"/>
    <circle cx="20" cy="0" r="10" fill="none" stroke="#059669" stroke-width="5"/>
    <path d="M-14 18c0-10 3-22 6-28" stroke="#065f46" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="-11" cy="-13" r="4" fill="#065f46"/>
    <circle cx="-4" cy="-11" r="4" fill="#065f46"/>
    <path d="M-30 24h72" stroke="#065f46" stroke-width="7" stroke-linecap="round"/>
  </g>
  <text x="240" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#065f46">SNAILCREAM</text>
  <text x="240" y="341" text-anchor="middle" font-family="Arial" font-size="11" fill="#4b6358">snail mucin · 10 g</text>
  <text x="240" y="355" text-anchor="middle" font-family="Arial" font-size="10" fill="#94a89e">MADE IN GERMANY</text>

  <!-- sparkle -->
  <g fill="#34d399">
    <path d="M356 150l4 12 12 4-12 4-4 12-4-12-12-4 12-4z"/>
    <path d="M112 130l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" opacity="0.7"/>
  </g>
</svg>
